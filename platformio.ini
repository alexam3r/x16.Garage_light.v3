; Прошивка гаражного света на ESP8266 (Wemos D1 mini)
; Среда сборки: PlatformIO + Arduino framework.

[env:nodemcu]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200

; Размер буфера PubSubClient на этапе компиляции (дублируется рантайм-вызовом
; mqtt.setBufferSize() в setup() — belt-and-suspenders).
build_flags =
    -D MQTT_MAX_PACKET_SIZE=512

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit AM2320 sensor library @ ^1.2.5
